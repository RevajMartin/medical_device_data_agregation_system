# Prometheus scrape config for the local stack.
#  - api:8000/metrics      -> RPS, per-status-code counts, request-latency histograms
#                             (prometheus-fastapi-instrumentator)
#  - rabbitmq:15692/metrics -> queue depth (ready/unacked), publish/deliver rates
#                             (rabbitmq_prometheus plugin, per-object metrics on)
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
