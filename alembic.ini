[alembic]
script_location = migrations
# The database URL is provided at runtime by migrations/env.py from the
# application settings (DATABASE_URL env var); this value is only a placeholder.
sqlalchemy.url = postgresql+asyncpg://user:pass@db:5432/medical_data

# Additional settings for async SQLAlchemy
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S

# Async SQLAlchemy settings for Alembic
[alembic.runner]
search_path = migrations
